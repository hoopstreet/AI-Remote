name: Release & Distribution Engine
on:
  workflow_run:
    workflows: ["AI Professional Coder"]
    types: [completed]
    branches: [main]
jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Auto-Increment Version
        run: |
          VERSION=$(grep "VERSION:" docs/VERSION.md | awk '{print $2}')
          IFS='.' read -r major minor patch <<< "$VERSION"
          patch=$((patch + 1))
          NEW_VERSION="$major.$minor.$patch"
          sed -i "s/VERSION: $VERSION/VERSION: $NEW_VERSION/" docs/VERSION.md
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
      - name: Generate Release Notes
        run: |
          echo "Release ${{ env.NEW_VERSION }}" > release_notes.md
          tail -n 20 docs/CHANGELOG.md >> release_notes.md
      - name: Create Git Tag
        run: |
          git config --global user.name "AI-Release-Bot"
          git config --global user.email "release@ai-remote.io"
          git add docs/VERSION.md
          git commit -m "RELEASE: v${{ env.NEW_VERSION }} [skip ci]"
          git tag -a "v${{ env.NEW_VERSION }}" -m "Release v${{ env.NEW_VERSION }}"
          git push origin main --tags
