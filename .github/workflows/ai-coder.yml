name: AI Autonomous Coder
on:
  push:
    paths:
      - 'docs/APPROVED_CHANGES.md'

jobs:
  execute-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Apply Approved Code
        run: node scripts/apply-code.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AI-Remote-Bot"
          git config --global user.email "bot@hoopstreet.com"
          git add .
          git commit -m "chore: AI applied approved code changes" || echo "No changes to commit"
          git push
