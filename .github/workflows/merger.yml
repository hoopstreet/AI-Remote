name: State & Version Merger
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/VERSION.md'

jobs:
  update-state:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Versioning
        run: |
          # Simple auto-increment for the solo-preneur blueprint
          VERSION=$(cat docs/VERSION.md | grep "VERSION" | cut -d' ' -f2)
          echo "Current Version: $VERSION"
