name: Task Runner
on:
  push:
    paths:
      - 'docs/Task.md'
jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Core Pipeline
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/task-runner.sh
