name: Task Runner
on:
  push:
    paths:
      - 'docs/Task.md'
jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Run AI Agent
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          chmod +x scripts/*.sh
          node scripts/ai-executor.js "$(grep -B 2 "Status: pending" docs/Task.md | head -n 1)"
          ./scripts/validator.sh
      - name: Commit & Push Code
        run: |
          git config --global user.name "AI-Agent-Coder"
          git add .
          git commit -m "FIX: Automated code generation for T-001 [skip ci]" || echo "No changes"
          git push
