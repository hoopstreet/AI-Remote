name: Global State Sync
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update SOURCE_MAP and DNA
        run: |
          chmod +x scripts/source-map.sh
          ./scripts/source-map.sh
      - name: Push Updates
        run: |
          git config --global user.name "AI-State-Manager"
          git config --global user.email "state@ai-remote.io"
          git add docs/
          git commit -m "CHORE: Syncing DNA and Source Map [skip ci]" || echo "No changes"
          git push origin main
