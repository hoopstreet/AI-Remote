name: 🛡️ AI-Remote Elite Sentinel
on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 mins to keep the heart beating
  push:
    branches: [ main ]
    paths:
      - 'src/core/**'
      - 'src/main.js'

jobs:
  sentinel-pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: 🛡️ Execution Pulse
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_KEY }}
        run: npm start
