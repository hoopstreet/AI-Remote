name: Brain Sync
on:
  push:
    branches: [ main ]
    paths-ignore: [ 'docs/**' ]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Navigation & Memory
        run: |
          chmod +x scripts/*.sh
          ./scripts/source-map.sh
          echo "- System update on $(date)" >> docs/KNOWLEDGE_BASE.md
      - name: Commit Intelligence
        run: |
          git config --global user.name "AI-Brain"
          git add docs/
          git commit -m "MEM: Updated project navigation and knowledge [skip ci]" || echo "No changes"
          git push
