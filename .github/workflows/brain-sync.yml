name: Brain Sync
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Sync to Supabase
        run: |
          curl -X POST "https://ixdukafvxqermhgoczou.supabase.co/functions/v1/brain-sync-node" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{"status": "online", "node": "github-actions"}'
