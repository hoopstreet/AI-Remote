name: AI Professional Coder
on:
  push:
    paths:
      - 'docs/Task.md'
jobs:
  generate-and-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: AI Code Generation
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/orchestrator.sh docs/Task.md
      - name: Commit Changes
        run: |
          git config --global user.name "AI-CTO-Generator"
          git config --global user.email "cto@ai-remote.io"
          git add .
          git commit -m "AI: Implementation of Task.md [skip ci]" || echo "No changes to commit"
          git push origin main
