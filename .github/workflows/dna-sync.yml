name: DNA & Version Sync
on:
  push:
    branches: [ main ]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Sync Truth
        run: |
          date +%Y-%m-%d > docs/VERSION.md
          ./scripts/source-map.sh
      - name: Auto-Commit
        run: |
          git config --global user.name "AI-Sync"
          git add docs/
          git commit -m "CHORE: Syncing DNA and Version [skip ci]" || echo "No changes"
          git push
