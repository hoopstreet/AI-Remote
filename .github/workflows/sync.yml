name: Global State Sync
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Git Config
        run: |
          git config --global user.name "AI-State-Manager"
          git config --global user.email "bot@ai-remote.io"
      - name: Sync DNA
        run: |
          git pull --rebase origin main
          # Any automated docs updates here
          git add .
          git commit -m "CHORE: Syncing DNA [skip ci]" || echo "No changes"
          git push origin main
